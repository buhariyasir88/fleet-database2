services:
  # Backend API Service
  - type: web
    name: fleet-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 5005
      - key: MONGODB_URI
        sync: false
    healthCheckPath: /api/dashboard
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: fleet-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s build
    envVars:
      - key: REACT_APP_API_URL
        value: https://fleet-backend.onrender.com/api